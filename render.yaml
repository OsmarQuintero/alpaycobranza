services:
  - type: web
    name: alpay-backend
    env: docker
    plan: free
    rootDir: sistema-cobranza
    dockerfilePath: ./Dockerfile
    healthCheckPath: /api/health
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: JPA_DDL_AUTO
        value: update
      - key: JPA_SHOW_SQL
        value: "false"
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRATION_MS
        value: "86400000"
      - key: CONTACT_TO
        sync: false
      - key: CORS_ALLOWED_ORIGIN_PATTERNS
        sync: false
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        sync: false
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASS
        sync: false
      - key: MULTIPART_MAX_FILE_SIZE
        value: 10MB
      - key: MULTIPART_MAX_REQUEST_SIZE
        value: 20MB

      - key: WHATSAPP_ENABLED
        value: "false"
      - key: WHATSAPP_PROVIDER
        value: "meta"
      - key: WHATSAPP_BASE_URL
        value: "https://graph.facebook.com"
      - key: WHATSAPP_API_VERSION
        value: "v21.0"
      - key: WHATSAPP_PHONE_NUMBER_ID
        sync: false
      - key: WHATSAPP_ACCESS_TOKEN
        sync: false
      - key: WHATSAPP_DEFAULT_COUNTRY_CODE
        value: "52"
