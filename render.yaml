services:
  - type: web
    name: alpay-backend
    env: java
    plan: free
    rootDir: sistema-cobranza
    buildCommand: ./mvnw clean package -DskipTests
    startCommand: java -jar target/sistema-cobranza-0.0.1-SNAPSHOT.jar
    healthCheckPath: /api/auth/login
    envVars:
      - key: DB_URL
        sync: false
      - key: DB_USER
        sync: false
      - key: DB_PASS
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: CONTACT_TO
        sync: false
      - key: CORS_ALLOWED_ORIGIN_PATTERNS
        sync: false
      - key: MAIL_HOST
        sync: false
      - key: MAIL_PORT
        sync: false
      - key: MAIL_USER
        sync: false
      - key: MAIL_PASS
        sync: false
