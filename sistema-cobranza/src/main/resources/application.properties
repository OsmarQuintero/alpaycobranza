# App
spring.application.name=Alpay-Backend
server.port=${PORT:8080}
server.address=0.0.0.0

# Database (usar variables en produccion)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/alpay?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:Lechuga23@}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:validate}
spring.jpa.show-sql=${JPA_SHOW_SQL:false}
spring.jpa.properties.hibernate.proc.param_null_passing=true

# Configuración para Gmail Real
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=quinterovaldzosmar.4@gmail.com
spring.mail.password=ztuunqkjmipkcjbh
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.default-encoding=UTF-8

# Frontend URL (password reset links)
app.frontend.url=${FRONTEND_URL:http://localhost:4200}

# Contact receiver
app.contact.to=${CONTACT_TO:osmdigitalweb@gmail.com}

# CORS (comma-separated origin patterns)
app.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:4200,http://127.0.0.1:4200,http://192.168.*.*:4200,http://10.*.*.*:4200}

# JWT
app.jwt.secret=${JWT_SECRET:change-this-secret-in-production-min-32-bytes}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Auth protection (rate limit + lockout)
app.auth.max-attempts-per-identity=${AUTH_MAX_ATTEMPTS_PER_IDENTITY:5}
app.auth.max-attempts-per-ip=${AUTH_MAX_ATTEMPTS_PER_IP:20}
app.auth.attempt-window-minutes=${AUTH_ATTEMPT_WINDOW_MINUTES:10}
app.auth.lock-minutes=${AUTH_LOCK_MINUTES:15}

# Upload limits
spring.servlet.multipart.max-file-size=${MULTIPART_MAX_FILE_SIZE:10MB}
spring.servlet.multipart.max-request-size=${MULTIPART_MAX_REQUEST_SIZE:20MB}

# Hosted checkout URLs (Stripe/Conekta/MercadoPago links)
app.payment.basic-mensual-url=${PAYMENT_BASIC_MENSUAL_URL:https://buy.stripe.com/test_aFaaEYdsL5DofRu9oZaVa01}
app.payment.basic-anual-url=${PAYMENT_BASIC_ANUAL_URL:https://buy.stripe.com/test_8x29AUgEXe9UfRu7gRaVa00}
app.payment.pro-mensual-url=${PAYMENT_PRO_MENSUAL_URL:}
app.payment.pro-anual-url=${PAYMENT_PRO_ANUAL_URL:}
app.payment.empresarial-mensual-url=${PAYMENT_EMPRESARIAL_MENSUAL_URL:}
app.payment.empresarial-anual-url=${PAYMENT_EMPRESARIAL_ANUAL_URL:}

# WhatsApp Cloud API (Meta)
app.whatsapp.enabled=${WHATSAPP_ENABLED:false}
app.whatsapp.provider=${WHATSAPP_PROVIDER:meta}
app.whatsapp.base-url=${WHATSAPP_BASE_URL:https://graph.facebook.com}
app.whatsapp.api-version=${WHATSAPP_API_VERSION:v21.0}
app.whatsapp.phone-number-id=${WHATSAPP_PHONE_NUMBER_ID:}
app.whatsapp.access-token=${WHATSAPP_ACCESS_TOKEN:}
app.whatsapp.default-country-code=${WHATSAPP_DEFAULT_COUNTRY_CODE:52}
